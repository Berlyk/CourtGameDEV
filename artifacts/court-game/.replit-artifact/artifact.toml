kind = "web"
previewPath = "/"
title = "СУД — Онлайн игра"
version = "1.0.0"
id = "artifacts/court-game"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 22615
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/court-game run dev"

[services.env]
PORT = "22615"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/court-game", "run", "build"]
publicDir = "artifacts/court-game/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
